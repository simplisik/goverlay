name: Build & Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: electron-overlay
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npx cmake-js rebuild --runtime electron --runtime-version 33.0.0 -A x64

      - name: Pack tarball
        run: npm pack

      - name: Upload tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: electron-overlay/simplisik-goverlay-*.tgz
